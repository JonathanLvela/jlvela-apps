# No build step — pure static HTML
[build]
  publish = "."

# Clean URLs
[[redirects]]
  from   = "/presli"
  to     = "/presli/"
  status = 301

[[redirects]]
  from   = "/presli/support"
  to     = "/presli/support.html"
  status = 200

[[redirects]]
  from   = "/presli/privacy"
  to     = "/presli/privacy.html"
  status = 200

[[redirects]]
  from   = "/presli/terms"
  to     = "/presli/terms.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
